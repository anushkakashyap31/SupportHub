name: SupportHub CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  TRIAGE_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-triage-backend
  TRIAGE_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-triage-frontend
  QUIZ_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-quiz-backend
  QUIZ_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-quiz-frontend
  NGINX_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-nginx

jobs:
  # ── JOB 1: TEST ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TriageAgent dependencies
        run: |
          cd TriageAgent/backend
          pip install -r requirements.txt

      - name: Install QuizBot dependencies
        run: |
          cd QuizBot/backend
          pip install -r requirements.txt

      - name: Check TriageAgent syntax
        run: |
          cd TriageAgent/backend
          python -m py_compile app/main.py
          echo "✅ TriageAgent syntax OK"

      - name: Check QuizBot syntax
        run: |
          cd QuizBot/backend
          python -m py_compile app/main.py
          echo "✅ QuizBot syntax OK"

  # ── JOB 2: BUILD & PUSH ────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push TriageAgent backend
        uses: docker/build-push-action@v5
        with:
          context: ./TriageAgent/backend
          push: true
          tags: ${{ env.TRIAGE_BACKEND_IMAGE }}:latest

      - name: Build and push TriageAgent frontend
        uses: docker/build-push-action@v5
        with:
          context: ./TriageAgent/frontend
          push: true
          tags: ${{ env.TRIAGE_FRONTEND_IMAGE }}:latest

      - name: Build and push QuizBot backend
        uses: docker/build-push-action@v5
        with:
          context: ./QuizBot/backend
          push: true
          tags: ${{ env.QUIZ_BACKEND_IMAGE }}:latest

      - name: Build and push QuizBot frontend
        uses: docker/build-push-action@v5
        with:
          context: ./QuizBot/frontend
          push: true
          tags: ${{ env.QUIZ_FRONTEND_IMAGE }}:latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ env.NGINX_IMAGE }}:latest

  # ── JOB 3: DEPLOY TO EC2 ───────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # ── 1. Ensure repo is up to date ──────────────────────────
            REPO_DIR="$HOME/SupportHub"
            if [ -d "$REPO_DIR" ]; then
              if git -C "$REPO_DIR" rev-parse --git-dir > /dev/null 2>&1; then
                cd "$REPO_DIR"
                git fetch origin main
                git reset --hard origin/main
              else
                rm -rf "$REPO_DIR"
                git clone https://github.com/anushkakashyap31/SupportHub.git "$REPO_DIR"
                cd "$REPO_DIR"
              fi
            else
              git clone https://github.com/anushkakashyap31/SupportHub.git "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            # ── 2. Write root .env (docker-compose reads this) ────────
            cat > .env << ENVEOF
            TRIAGE_GEMINI_API_KEY=${{ secrets.TRIAGE_GEMINI_API_KEY }}
            TRIAGE_JWT_SECRET=${{ secrets.TRIAGE_JWT_SECRET }}
            TRIAGE_FRONTEND_URL=http://${{ secrets.EC2_HOST }}:8080
            QUIZ_GEMINI_API_KEY=${{ secrets.QUIZ_GEMINI_API_KEY }}
            QUIZ_JWT_SECRET=${{ secrets.QUIZ_JWT_SECRET }}
            QUIZ_FRONTEND_URL=http://${{ secrets.EC2_HOST }}:8080
            ENVEOF

            # ── 3. Pull latest Docker images from Docker Hub ──────────
            sudo docker compose pull

            # ── 4. Restart containers with new images ─────────────────
            sudo docker compose up -d --remove-orphans

            # ── 5. Remove old unused images ───────────────────────────
            sudo docker image prune -f

            # ── 6. Health check ───────────────────────────────────────
            sleep 15
            sudo docker compose ps
            echo "✅ SupportHub Deployed successfully! and Live at http://${{ secrets.EC2_HOST }}:8080"