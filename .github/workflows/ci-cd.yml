name: SupportHub CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  TRIAGE_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-triage-backend
  TRIAGE_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-triage-frontend
  QUIZ_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-quiz-backend
  QUIZ_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-quiz-frontend
  NGINX_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/supporthub-nginx

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TriageAgent dependencies
        run: |
          cd TriageAgent/backend
          pip install -r requirements.txt

      - name: Install QuizBot dependencies
        run: |
          cd QuizBot/backend
          pip install -r requirements.txt

      - name: Check TriageAgent imports
        run: |
          cd TriageAgent/backend
          python -c "from app.main import app; print('TriageAgent OK')"

      - name: Check QuizBot imports
        run: |
          cd QuizBot/backend
          python -c "from app.main import app; print('QuizBot OK')"

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push TriageAgent backend
        uses: docker/build-push-action@v5
        with:
          context: ./TriageAgent/backend
          push: true
          tags: ${{ env.TRIAGE_BACKEND_IMAGE }}:latest

      - name: Build and push TriageAgent frontend
        uses: docker/build-push-action@v5
        with:
          context: ./TriageAgent/frontend
          push: true
          tags: ${{ env.TRIAGE_FRONTEND_IMAGE }}:latest

      - name: Build and push QuizBot backend
        uses: docker/build-push-action@v5
        with:
          context: ./QuizBot/backend
          push: true
          tags: ${{ env.QUIZ_BACKEND_IMAGE }}:latest

      - name: Build and push QuizBot frontend
        uses: docker/build-push-action@v5
        with:
          context: ./QuizBot/frontend
          push: true
          tags: ${{ env.QUIZ_FRONTEND_IMAGE }}:latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.NGINX_IMAGE }}:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        run: |
          echo "Deployment step - pulls latest images and restarts services"
          echo "In production this would SSH into your server and run docker compose up -d"
          docker compose config