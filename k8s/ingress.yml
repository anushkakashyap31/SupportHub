apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supporthub-ingress
  labels:
    platform: supporthub
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: supporthub.local
      http:
        paths:
          - path: /triage
            pathType: Prefix
            backend:
              service:
                name: triage-frontend
                port:
                  number: 3000
          - path: /quiz
            pathType: Prefix
            backend:
              service:
                name: quiz-frontend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80