apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-backend
  labels:
    app: triage-backend
    platform: supporthub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triage-backend
  template:
    metadata:
      labels:
        app: triage-backend
    spec:
      containers:
        - name: triage-backend
          image: anushkakashyap31/supporthub-triage-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: triage-secrets
                  key: gemini-api-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: triage-secrets
                  key: secret-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: triage-secrets
                  key: jwt-secret
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: triage-secrets
                  key: frontend-url
            - name: FIREBASE_CREDENTIALS_PATH
              value: "/app/firebase-credentials.json"
          volumeMounts:
            - name: firebase-creds
              mountPath: /app/firebase-credentials.json
              subPath: triage-firebase
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: firebase-creds
          secret:
            secretName: firebase-credentials