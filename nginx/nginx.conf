events {
    worker_connections 1024;
}

http {
    upstream triage_frontend {
        server triage-frontend:3000;
    }

    upstream triage_backend {
        server triage-backend:8000;
    }

    upstream quiz_frontend {
        server quiz-frontend:3001;
    }

    upstream quiz_backend {
        server quiz-backend:8001;
    }

    server {
        listen 80;

        location /triage/api/ {
            rewrite ^/triage/api/(.*) /api/$1 break;
            proxy_pass http://triage_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /triage/ {
            rewrite ^/triage/(.*) /$1 break;
            proxy_pass http://triage_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /quiz/api/ {
            rewrite ^/quiz/api/(.*) /api/$1 break;
            proxy_pass http://quiz_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /quiz/ {
            rewrite ^/quiz/(.*) /$1 break;
            proxy_pass http://quiz_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}